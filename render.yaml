services:
  - type: web
    name: street-banker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      # Sessions survive restarts; Render generates a strong random value.
      - key: SECRET_KEY
        generateValue: true
      # Rotate the demo showcase account's password: set the value in the
      # Render dashboard (Environment tab). Never commit it.
      - key: DEMO_PASSWORD
        sync: false
      # Persistent storage (Starter instance + 1GB disk): database and all
      # uploads (documents, covers, EPK photos, sync audio) live under this
      # path together, so the one disk below covers everything.
      - key: DATABASE_PATH
        value: /var/data/streetbanker.db
    disk:
      name: street-banker-data
      mountPath: /var/data
      sizeGB: 1
