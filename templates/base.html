<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Royalty Sweep{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="flex min-h-screen">
    <aside class="w-56 shrink-0 border-r border-gray-800 bg-gray-900 p-4">
      <div class="mb-8 text-lg font-semibold tracking-tight">music-artist-hub</div>
      <nav class="space-y-1 text-sm">
        <a href="/dashboard" class="block rounded-md px-3 py-2 text-gray-300 hover:bg-gray-800 hover:text-white">Dashboard</a>
      </nav>
    </aside>
    <main class="flex-1 p-8">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
