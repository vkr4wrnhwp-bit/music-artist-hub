<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Royalty Sweep by Street Banker{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='white' stroke='black' stroke-width='2'/%3E%3Cpath d='M13 10.5L21 16L13 21.5V10.5Z' fill='black'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Helvetica Neue", "Helvetica", "Arial", "sans-serif"],
          },
        },
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="min-h-screen bg-white font-sans text-black">
  <div class="flex min-h-screen">
    <aside class="w-64 shrink-0 border-r border-gray-200 px-8 py-10">
      <div class="flex items-center gap-3">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="shrink-0">
          <circle cx="16" cy="16" r="14" stroke="black" stroke-width="1.5"/>
          <path d="M13 10.5L21 16L13 21.5V10.5Z" fill="black"/>
        </svg>
        <div class="leading-[1.1] tracking-tight">
          <div class="text-sm font-bold">Royalty</div>
          <div class="text-sm font-bold">Sweep</div>
        </div>
      </div>

      <div class="relative mt-6 inline-flex items-center px-5 py-2.5">
        <span class="absolute left-0 top-0 h-3 w-3 border-l border-t border-black"></span>
        <span class="absolute right-0 top-0 h-3 w-3 border-r border-t border-black"></span>
        <span class="absolute bottom-0 left-0 h-3 w-3 border-b border-l border-black"></span>
        <span class="absolute bottom-0 right-0 h-3 w-3 border-b border-r border-black"></span>
        <span class="text-sm font-semibold tracking-wide">.street banker</span>
      </div>

      <nav class="mt-12 space-y-1 text-sm">
        <a href="/dashboard" class="block py-2 text-gray-500 transition-colors hover:text-black">Dashboard</a>
      </nav>
    </aside>
    <main class="flex-1 px-16 py-12">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
