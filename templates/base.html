<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Royalty Sweep by Street Banker{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%231a1a2e' stroke='white' stroke-width='2'/%3E%3Cpath d='M13 10.5L21 16L13 21.5V10.5Z' fill='white'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div class="flex min-h-screen">
    <aside class="w-60 shrink-0 border-r border-gray-800 bg-gray-900 p-5">
      <div class="mb-1 flex items-center gap-2.5">
        <svg width="30" height="30" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" class="shrink-0">
          <circle cx="16" cy="16" r="14" stroke="white" stroke-width="2"/>
          <path d="M13 10.5L21 16L13 21.5V10.5Z" fill="white"/>
        </svg>
        <div class="leading-[1.05]">
          <div class="text-sm font-bold">Royalty</div>
          <div class="text-sm font-bold">Sweep</div>
        </div>
      </div>
      <div class="relative mb-8 mt-3 inline-flex items-center rounded-sm bg-gray-100 px-3 py-1 text-gray-900">
        <span class="absolute left-0 top-0 h-2 w-2 border-l-2 border-t-2 border-gray-900"></span>
        <span class="absolute right-0 top-0 h-2 w-2 border-r-2 border-t-2 border-gray-900"></span>
        <span class="absolute bottom-0 left-0 h-2 w-2 border-b-2 border-l-2 border-gray-900"></span>
        <span class="absolute bottom-0 right-0 h-2 w-2 border-b-2 border-r-2 border-gray-900"></span>
        <span class="text-[11px] font-bold tracking-tight">.street banker</span>
      </div>
      <nav class="space-y-1 text-sm">
        <a href="/dashboard" class="flex items-center gap-2 rounded-md px-3 py-2 text-gray-300 transition-colors hover:bg-gray-800 hover:text-white">
          <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path d="M3 3h6v6H3V3zm8 0h6v6h-6V3zM3 11h6v6H3v-6zm8 0h6v6h-6v-6z"/></svg>
          Dashboard
        </a>
      </nav>
    </aside>
    <main class="flex-1 p-8">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
