<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create account - Street Banker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0a0b] text-gray-200 antialiased">
  <div class="mx-auto flex min-h-screen max-w-sm flex-col items-center justify-center px-4">
    <div class="mb-8 text-center">
      <div class="text-xl font-bold tracking-[0.3em] text-gray-100">STREET BANKER</div>
      <div class="mt-1 text-[10px] uppercase tracking-[0.2em] text-amber-500/70">Artist Infrastructure</div>
    </div>

    <div class="w-full rounded-2xl border border-white/10 bg-[#111113] p-6">
      <h1 class="text-lg font-bold text-white">Create your account</h1>
      <p class="mt-1 text-sm text-gray-500">Set up your artist back office.</p>

      {% if error %}
      <div class="mt-4 rounded-lg border border-red-500/20 bg-red-500/10 px-3 py-2 text-xs font-semibold text-red-400">{{ error }}</div>
      {% endif %}

      <form method="post" class="mt-4 space-y-3">
        <div>
          <label for="name" class="text-[10px] font-semibold uppercase tracking-[0.15em] text-gray-500">Artist / display name</label>
          <input type="text" id="name" name="name" autofocus autocomplete="name"
                 class="mt-1 w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-gray-100 focus:border-amber-500/50 focus:outline-none">
        </div>
        <div>
          <label for="email" class="text-[10px] font-semibold uppercase tracking-[0.15em] text-gray-500">Email</label>
          <input type="email" id="email" name="email" autocomplete="email"
                 class="mt-1 w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-gray-100 focus:border-amber-500/50 focus:outline-none">
        </div>
        <div>
          <label for="password" class="text-[10px] font-semibold uppercase tracking-[0.15em] text-gray-500">Password (6+ characters)</label>
          <input type="password" id="password" name="password" autocomplete="new-password"
                 class="mt-1 w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-gray-100 focus:border-amber-500/50 focus:outline-none">
        </div>
        <div>
          <label class="text-[10px] font-semibold uppercase tracking-[0.15em] text-gray-500">I am a...</label>
          <div class="mt-1.5 grid grid-cols-2 gap-2">
            <label class="flex cursor-pointer items-center justify-center gap-2 rounded-lg border border-amber-500/40 bg-amber-500/10 px-3 py-2 text-xs font-bold text-amber-400">
              <input type="radio" name="account_type" value="artist" checked class="accent-amber-500"> Artist / Team
            </label>
            <label class="flex cursor-pointer items-center justify-center gap-2 rounded-lg border border-white/10 px-3 py-2 text-xs font-bold text-gray-300">
              <input type="radio" name="account_type" value="fan" class="accent-amber-500"> Music Fan
            </label>
          </div>
        </div>
        <button type="submit" class="w-full rounded-lg border border-amber-500/40 bg-amber-500/15 px-4 py-2.5 text-sm font-semibold text-amber-400 transition-colors hover:bg-amber-500/25">Create Account</button>
      </form>

      <p class="mt-3 text-center text-xs text-gray-500">Already have an account? <a href="/login" class="font-semibold text-amber-400 hover:underline">Sign in</a></p>
    </div>

    <p class="mt-5 text-center text-[11px] text-gray-600">Passwords are stored hashed. No payment details are collected.</p>
  </div>
</body>
</html>
