<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choose a new password - Street Banker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0a0b] text-gray-200 antialiased">
  <div class="mx-auto flex min-h-screen max-w-sm flex-col items-center justify-center px-4">
    <div class="mb-8 text-center">
      <div class="text-xl font-bold tracking-[0.3em] text-gray-100">STREET BANKER</div>
      <div class="mt-1 text-[10px] uppercase tracking-[0.2em] text-amber-500/70">Artist Infrastructure</div>
    </div>

    <div class="w-full rounded-2xl border border-white/10 bg-[#111113] p-6">
      {% if invalid %}
      <h1 class="text-lg font-bold text-white">Link expired</h1>
      <p class="mt-2 text-sm text-gray-400">This reset link is invalid or has expired (they last 1 hour). Request a fresh one and try again.</p>
      <a href="/forgot" class="mt-4 block w-full rounded-lg border border-amber-500/40 bg-amber-500/15 px-4 py-2.5 text-center text-sm font-semibold text-amber-400 hover:bg-amber-500/25">Request a new link</a>
      {% else %}
      <h1 class="text-lg font-bold text-white">Choose a new password</h1>
      {% if error %}
      <div class="mt-4 rounded-lg border border-red-500/20 bg-red-500/10 px-3 py-2 text-xs font-semibold text-red-400">{{ error }}</div>
      {% endif %}
      <form method="post" class="mt-4 space-y-3">
        <div>
          <label for="password" class="text-[10px] font-semibold uppercase tracking-[0.15em] text-gray-500">New password</label>
          <input type="password" id="password" name="password" required minlength="6" autofocus autocomplete="new-password"
                 class="mt-1 w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-gray-100 focus:border-amber-500/50 focus:outline-none">
        </div>
        <button type="submit" class="w-full rounded-lg border border-amber-500/40 bg-amber-500/15 px-4 py-2.5 text-sm font-semibold text-amber-400 transition-colors hover:bg-amber-500/25">Set Password & Sign In</button>
      </form>
      {% endif %}
    </div>
  </div>
</body>
</html>
