<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} - Street Banker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0a0b] text-gray-200 antialiased">
  <div class="mx-auto max-w-2xl px-5 py-12">
    <a href="/" class="text-xs font-bold uppercase tracking-[0.3em] text-amber-500/80 hover:text-amber-400">← Street Banker</a>
    <h1 class="mt-4 text-3xl font-black text-white">{{ title }}</h1>
    <p class="mt-1 text-xs text-gray-500">Last updated: {{ updated }}</p>
    <div class="prose-invert mt-8 space-y-6">
      {% for heading, body in sections %}
      <section>
        <h2 class="text-base font-bold text-amber-400/90">{{ heading }}</h2>
        <p class="mt-2 text-sm leading-relaxed text-gray-300">{{ body }}</p>
      </section>
      {% endfor %}
    </div>
    <div class="mt-12 border-t border-white/10 pt-6 text-xs text-gray-500">
      Questions: <a href="mailto:team.summitarts@gmail.com" class="text-amber-400 hover:underline">team.summitarts@gmail.com</a>
      · <a href="/terms" class="hover:text-gray-300">Terms</a>
      · <a href="/privacy" class="hover:text-gray-300">Privacy</a>
    </div>
  </div>
</body>
</html>
