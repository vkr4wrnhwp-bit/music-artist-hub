<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in - Royalty Sweep</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0a0b] text-gray-200 antialiased">
  <div class="mx-auto flex min-h-screen max-w-sm flex-col items-center justify-center px-4">
    <div class="mb-8 text-center">
      <div class="text-xl font-bold tracking-[0.3em] text-gray-100">ROYALTY SWEEP</div>
      <div class="mt-1 text-[10px] uppercase tracking-[0.2em] text-amber-500/70">Track it. Collect it. Sweep it.</div>
    </div>

    <div class="w-full rounded-2xl border border-white/10 bg-[#111113] p-6">
      <h1 class="text-lg font-bold text-white">Artist Portal</h1>
      <p class="mt-1 text-sm text-gray-500">Enter your passkey to access the app.</p>

      {% if error %}
      <div class="mt-4 rounded-lg border border-red-500/20 bg-red-500/10 px-3 py-2 text-xs font-semibold text-red-400">{{ error }}</div>
      {% endif %}

      <form method="post" class="mt-4 space-y-3">
        <div>
          <label for="passkey" class="text-[10px] font-semibold uppercase tracking-[0.15em] text-gray-500">Passkey</label>
          <input type="password" id="passkey" name="passkey" autofocus autocomplete="off"
                 class="mt-1 w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-gray-100 focus:border-amber-500/50 focus:outline-none">
        </div>
        <button type="submit" class="w-full rounded-lg border border-amber-500/40 bg-amber-500/15 px-4 py-2.5 text-sm font-semibold text-amber-400 transition-colors hover:bg-amber-500/25">Enter Artist Portal</button>
      </form>

      <div class="my-4 flex items-center gap-3 text-[10px] uppercase tracking-widest text-gray-600">
        <span class="h-px flex-1 bg-white/10"></span>OR<span class="h-px flex-1 bg-white/10"></span>
      </div>

      <a href="/overview" class="block w-full rounded-lg border border-white/10 px-4 py-2.5 text-center text-sm font-semibold text-gray-300 transition-colors hover:bg-white/5">Continue as a Fan</a>
    </div>

    <p class="mt-5 text-center text-[11px] text-gray-600">Demo only — this is a simulated passkey gate, not real authentication.<br>No accounts, no personal data. Passkey: <span class="font-mono text-gray-400">sweep</span></p>
  </div>
</body>
</html>
