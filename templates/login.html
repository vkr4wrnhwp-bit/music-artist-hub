<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in - Street Banker</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#0a0a0b] text-gray-200 antialiased">
  <div class="mx-auto flex min-h-screen max-w-sm flex-col items-center justify-center px-4">
    <div class="mb-8 text-center">
      <div class="text-xl font-bold tracking-[0.3em] text-gray-100">STREET BANKER</div>
      <div class="mt-1 text-[10px] uppercase tracking-[0.2em] text-amber-500/70">Artist Infrastructure</div>
    </div>

    <div class="w-full rounded-2xl border border-white/10 bg-[#111113] p-6">
      <h1 class="text-lg font-bold text-white">Artist Portal</h1>
      <p class="mt-1 text-sm text-gray-500">Sign in to your account.</p>

      {% if error %}
      <div class="mt-4 rounded-lg border border-red-500/20 bg-red-500/10 px-3 py-2 text-xs font-semibold text-red-400">{{ error }}</div>
      {% endif %}

      <form method="post" class="mt-4 space-y-3">
        <div>
          <label for="email" class="text-[10px] font-semibold uppercase tracking-[0.15em] text-gray-500">Email</label>
          <input type="email" id="email" name="email" autofocus autocomplete="email"
                 class="mt-1 w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-gray-100 focus:border-amber-500/50 focus:outline-none">
        </div>
        <div>
          <label for="password" class="text-[10px] font-semibold uppercase tracking-[0.15em] text-gray-500">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password"
                 class="mt-1 w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-gray-100 focus:border-amber-500/50 focus:outline-none">
        </div>
        <button type="submit" class="w-full rounded-lg border border-amber-500/40 bg-amber-500/15 px-4 py-2.5 text-sm font-semibold text-amber-400 transition-colors hover:bg-amber-500/25">Sign In</button>
      </form>

      <p class="mt-3 text-center text-xs text-gray-500">New here? <a href="/signup" class="font-semibold text-amber-400 hover:underline">Create an account</a></p>

      <div class="my-4 flex items-center gap-3 text-[10px] uppercase tracking-widest text-gray-600">
        <span class="h-px flex-1 bg-white/10"></span>OR<span class="h-px flex-1 bg-white/10"></span>
      </div>

      <form method="post" action="/login/demo">
        <button type="submit" class="w-full rounded-lg border border-white/10 px-4 py-2.5 text-sm font-semibold text-gray-300 transition-colors hover:bg-white/5">Tour the Demo Account</button>
      </form>
      <a href="/discover" class="mt-2 block w-full rounded-lg border border-white/10 px-4 py-2.5 text-center text-sm font-semibold text-gray-300 transition-colors hover:bg-white/5">Continue as a Fan</a>
    </div>

    <p class="mt-5 text-center text-[11px] text-gray-600">Accounts are real (stored securely with hashed passwords).<br>The demo account tours the app with sample data.</p>
  </div>
</body>
</html>
